name: 'WPCare Security Scan'
description: >-
  Off-platform WordPress security scanner. Enumerates the checked-out site's code
  on disk, matches it against the free Wordfence Intelligence vulnerability feed,
  and upserts a deduped per-site GitHub issue (one per site) while failing the run
  on alert-worthy Findings.
author: 'philltran'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  mode:
    description: 'Scan mode. This release ships "vuln" (Vulnerability Scan); "drift" and "both" are later phases.'
    required: false
    default: 'vuln'
  github-token:
    description: 'Token used to upsert the deduped per-site security issue. Needs issues:write. Pass ${{ secrets.GITHUB_TOKEN }}.'
    required: true
  site-path:
    description: 'Path to the checked-out site repo root for non-standard layouts. Defaults to GITHUB_WORKSPACE.'
    required: false
    default: ''
  wpscan-token:
    description: >-
      Optional WPScan API token. When supplied, per-plugin WPScan data is cross-referenced
      through the same matcher to add Findings the free Wordfence feed missed. When omitted,
      the Vulnerability Scan runs unchanged and needs zero secrets (the default). The token
      is a secret — pass ${{ secrets.WPSCAN_API_TOKEN }}; it is masked in logs and never printed.
    required: false
    default: ''
  fail-on:
    description: >-
      Minimum severity that fails the workflow status. One of: low, medium, high, critical.
      The deduped issue is always upserted with every Finding regardless; this only gates the
      failing status, which fires when a new/worsened alert-worthy Finding meets-or-exceeds the
      threshold. An unscored CVE (severity unknown) always fails. Defaults to "low" (every
      new/worsened alert-worthy Finding fails the run). Raise it to file findings without
      failing the run for less-severe ones.
    required: false
    default: 'low'

outputs:
  finding-count:
    description: 'Total number of Findings emitted by the scan.'
  alert-count:
    description: 'Number of alert-worthy Findings (cve / abandoned / embedded).'
  new-count:
    description: 'Number of new or newly-worsened alert-worthy Findings since the last run (this alone gates the failing status).'

runs:
  using: 'node24'
  main: 'dist/index.mjs'
