name: 'WPCare Security Scan'
description: >-
  Off-platform WordPress security scanner. Enumerates the checked-out site's code
  on disk, matches it against the free Wordfence Intelligence vulnerability feed,
  and upserts a deduped per-site GitHub issue (one per site) while failing the run
  on alert-worthy Findings.
author: 'philltran'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  mode:
    description: >-
      Scan mode: "vuln" (Vulnerability Scan, reads the git repo, zero secrets), "drift"
      (Drift Detection, reads live Pantheon state via Terminus and diffs the committed
      .security/baseline.json), or "both". drift/both require the pantheon-* inputs.
    required: false
    default: 'vuln'
  github-token:
    description: 'Token used to upsert the deduped per-site security issue. Needs issues:write. Pass ${{ secrets.GITHUB_TOKEN }}.'
    required: true
  site-path:
    description: 'Path to the checked-out site repo root for non-standard layouts. Defaults to GITHUB_WORKSPACE.'
    required: false
    default: ''
  wpscan-token:
    description: >-
      Optional WPScan API token. When supplied, per-plugin WPScan data is cross-referenced
      through the same matcher to add Findings the free Wordfence feed missed. When omitted,
      the Vulnerability Scan runs unchanged and needs zero secrets (the default). The token
      is a secret — pass ${{ secrets.WPSCAN_API_TOKEN }}; it is masked in logs and never printed.
    required: false
    default: ''
  fail-on:
    description: >-
      Minimum severity that fails the workflow status. One of: low, medium, high, critical.
      The deduped issue is always upserted with every Finding regardless; this only gates the
      failing status, which fires when a new/worsened alert-worthy Finding meets-or-exceeds the
      threshold. An unscored CVE (severity unknown) always fails. Defaults to "low" (every
      new/worsened alert-worthy Finding fails the run). Raise it to file findings without
      failing the run for less-severe ones.
    required: false
    default: 'low'
  pantheon-site:
    description: >-
      Pantheon site machine name for Drift Detection (mode drift | both). Site identity
      is explicit — never derived from the repo name, since a wrong guess pointed at
      credentialed live access is a dangerous failure (ADR-0010). Required for drift/both.
    required: false
    default: ''
  pantheon-machine-token:
    description: >-
      Pantheon machine token for Drift Detection (mode drift | both). A SECRET — pass
      ${{ secrets.PANTHEON_WPCARE_MACHINE_TOKEN }} (an org-level secret scoped to in-scope
      repos). The token belongs to a shared Team-Member service account confined to a
      dedicated org of in-scope sites (least privilege is the USER's, not the token's;
      a machine token cannot be scoped — ADR-0010). Masked in logs; never printed.
    required: false
    default: ''
  pantheon-env:
    description: 'Pantheon environment to read live state from. Defaults to "live" (the authoritative env per ADR-0010).'
    required: false
    default: 'live'
  update-baseline:
    description: >-
      When true (a workflow_dispatch input), re-bless the drift Baseline: regenerate
      .security/baseline.json from current live state and open a PR carrying it + the
      diff (never a blind write — a human merging the PR is the deliberate re-bless,
      ADR-0010). Requires mode drift | both and contents:write + pull-requests:write on
      the dispatch job. Defaults to false.
    required: false
    default: 'false'

outputs:
  finding-count:
    description: 'Total number of Findings emitted by the scan.'
  alert-count:
    description: 'Number of alert-worthy Findings (cve / abandoned / embedded).'
  new-count:
    description: 'Number of new or newly-worsened alert-worthy Findings since the last run (this alone gates the failing status).'
  baseline-pr-url:
    description: 'URL of the re-bless PR opened by an update-baseline dispatch (empty otherwise).'

runs:
  using: 'node24'
  main: 'dist/index.mjs'
