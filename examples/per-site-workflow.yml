# Per-site workflow — drop this into each WordPress site repo at
# .github/workflows/security-scan.yml. It is the only per-site footprint.
name: Security Scan

on:
  schedule:
    - cron: '17 6 * * 1'   # weekly, Monday 06:17 UTC
  pull_request:
  workflow_dispatch:

permissions:
  contents: read   # read the checked-out code on disk
  issues: write    # upsert the deduped per-site security issue

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: philltran/wpcare-security-scan@v0
        with:
          mode: vuln
          github-token: ${{ secrets.GITHUB_TOKEN }}
